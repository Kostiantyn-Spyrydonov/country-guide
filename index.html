<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Country Guide</title>
</head>
<body>
  <div class="container">
    <h1>Country Guide</h1>
    <form class="search-box" method="post" id="search-box">
      <input type="text" name="country-name" id="counrty-input" placeholder="Search Counrty...">
      <button type="submit" aria-label="search">svg</button>
    </form>
    <p class="errorTxt" id="errorTxt"></p>
    <div class="counrty-details" id="counrty-details">
      <h2 id="country-name">Counrty Name</h2>
      <div class="grid">
        <img src="" alt="flag" class="flag" id="flag">
        <ul class="info">
          <li><strong>Capital:</strong><span id="capital-city"></span></li>
          <li><strong>Area:</strong><span id="capital-city"></span></li>
          <li><strong>Population:</strong><span id="capital-city"></span></li>
          <li><strong>Population Density:</strong><span id="capital-city"></span></li>
          <li><strong>Currency:</strong><span id="capital-city"></span></li>
          <li><strong>Langueges:</strong><span id="capital-city"></span></li>
          <li><strong>Continent:</strong><span id="capital-city"></span></li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
